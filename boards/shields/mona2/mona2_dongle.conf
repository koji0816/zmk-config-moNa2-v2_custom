# モジュールをエラーなく動かすため、ドングルを「親機」だと宣言する
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# ---------------------------------------------------------
# ▼ ここからが裏ワザ ▼
# 「親機だけど、PCにキーボードとして認識させない」設定
CONFIG_ZMK_USB=n
CONFIG_ZMK_BLE=n
CONFIG_BT=n
